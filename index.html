<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的像素头像</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>我的像素头像</h1>
        </header>
        <main>
            <div class="avatar-container" id="avatarGrid">
                <!-- 16x16 pixel grid will be generated here -->
            </div>
            <div class="controls">
                <button id="generateBtn" class="btn btn-primary">生成头像</button>
                <button id="saveBtn" class="btn btn-secondary">保存头像</button>
                <button id="shareBtn" class="btn btn-secondary">分享链接</button>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
